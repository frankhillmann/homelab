# ============================================================
# Beispiel-Konfiguration für gethomepage.dev
# ============================================================
# Diese Gruppe funktioniert SOFORT -- nur öffentliche Links, keine Einrichtung.
- Schnellzugriff:
    - Homepage Doku:
        icon: homepage.png
        href: https://gethomepage.dev
        description: Doku zu diesem Dashboard
    - GitHub:
        icon: github.png
        href: https://github.com
        description: Code & Repositories
    - Home Assistant:
        icon: home-assistant.png
        href: https://www.home-assistant.io
        description: Smart-Home-Plattform
    - Proxmox:
        icon: proxmox.png
        href: https://www.proxmox.com
        description: Virtualisierung

# ============================================================
